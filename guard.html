<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>รายชื่อผู้ลงทะเบียนวันนี้ - รปภ. EGAT อรอ.</title>
<style>
  :root {
    --primary: #1d4ed8;
    --primary-dark: #1e3a8a;
    --success: #16a34a;
    --bg: #f1f5f9;
    --card: #ffffff;
    --text: #1e293b;
    --muted: #64748b;
    --border: #e2e8f0;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Segoe UI', 'Sarabun', Tahoma, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 16px;
  }
  .header {
    max-width: 900px;
    margin: 0 auto 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }
  .header h1 {
    font-size: 20px;
    color: var(--primary-dark);
    margin: 0;
  }
  .header .sub {
    font-size: 13px;
    color: var(--muted);
  }
  .status-bar {
    max-width: 900px;
    margin: 0 auto 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--card);
    border-radius: 12px;
    padding: 12px 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }
  .count-badge {
    background: var(--primary);
    color: #fff;
    font-weight: 700;
    font-size: 18px;
    padding: 6px 16px;
    border-radius: 999px;
  }
  .live-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--success);
    margin-right: 6px;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  .refresh-btn {
    background: #e2e8f0;
    border: none;
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    color: var(--text);
  }
  .list-container {
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .person-card {
    background: var(--card);
    border-radius: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    padding: 14px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }
  .person-photo {
    width: 72px;
    height: 72px;
    border-radius: 12px;
    object-fit: cover;
    background: #e2e8f0;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }
  .person-photo-placeholder {
    width: 72px;
    height: 72px;
    border-radius: 12px;
    background: #e2e8f0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    color: #94a3b8;
    flex-shrink: 0;
  }
  .person-info { flex: 1; min-width: 0; }
  .person-name {
    font-size: 17px;
    font-weight: 700;
    margin: 0 0 2px 0;
  }
  .person-time {
    font-size: 13px;
    color: var(--primary);
    font-weight: 600;
    white-space: nowrap;
  }
  .info-row {
    display: flex;
    flex-wrap: wrap;
    gap: 4px 16px;
    margin-top: 6px;
    font-size: 13px;
    color: var(--muted);
  }
  .info-row b { color: var(--text); font-weight: 600; }
  .top-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 8px;
  }
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .last-updated {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin-top: 16px;
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>👮 รายชื่อผู้ลงทะเบียนวันนี้</h1>
    <div class="sub" id="todayDate">EGAT อรอ.</div>
  </div>
</div>

<div class="status-bar">
  <div><span class="live-dot"></span><b>อัปเดตสด</b> ทุก 15 วินาที</div>
  <div class="count-badge" id="countBadge">0 คน</div>
  <button class="refresh-btn" id="refreshBtn">🔄 รีเฟรชตอนนี้</button>
</div>

<div class="list-container" id="listContainer">
  <div class="empty-state">
    <div class="icon">⏳</div>
    <div>กำลังโหลดข้อมูล...</div>
  </div>
</div>

<div class="last-updated" id="lastUpdated"></div>

<script>
/* =========================================================
   ตั้งค่า: ใช้ Web app URL เดียวกันกับไฟล์ index.html
   ========================================================= */
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz8SiP0ttRHg_Ma3eiTCuf7ZyKoz2YPbwrA_ASPqouipKPCNHr0-pkWWzYqPlZ_PMcMMg/exec";

const listContainer = document.getElementById('listContainer');
const countBadge = document.getElementById('countBadge');
const lastUpdated = document.getElementById('lastUpdated');
const todayDateEl = document.getElementById('todayDate');

// แสดงวันที่วันนี้
todayDateEl.textContent = "วันที่ " + new Date().toLocaleDateString('th-TH', {
  year: 'numeric', month: 'long', day: 'numeric'
});

/**
 * โหลดข้อมูลด้วยวิธี JSONP (เลี่ยงปัญหา CORS เวลาเรียกข้าม domain
 * จาก GitHub Pages ไปยัง Google Apps Script)
 */
function loadData() {
  const callbackName = 'cb_' + Date.now();
  window[callbackName] = function(response) {
    if (response.result === 'success') {
      renderList(response.data);
      lastUpdated.textContent = "อัปเดตล่าสุด: " + new Date().toLocaleTimeString('th-TH');
    } else {
      listContainer.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><div>โหลดข้อมูลไม่สำเร็จ</div></div>';
    }
    delete window[callbackName];
    script.remove();
  };

  const script = document.createElement('script');
  script.src = SCRIPT_URL + '?action=todayList&callback=' + callbackName;
  script.onerror = function() {
    listContainer.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><div>เชื่อมต่อระบบไม่ได้ กรุณาตรวจสอบอินเทอร์เน็ต</div></div>';
  };
  document.body.appendChild(script);
}

function renderList(data) {
  countBadge.textContent = data.length + " คน";

  if (data.length === 0) {
    listContainer.innerHTML = '<div class="empty-state"><div class="icon">📋</div><div>ยังไม่มีผู้ลงทะเบียนวันนี้</div></div>';
    return;
  }

  listContainer.innerHTML = data.map(function(p) {
    const photoHtml = p.photoUrl
      ? '<img class="person-photo" src="' + toDirectImageUrl(p.photoUrl) + '" alt="รูปถ่าย">'
      : '<div class="person-photo-placeholder">👤</div>';

    return `
      <div class="person-card">
        ${photoHtml}
        <div class="person-info">
          <div class="top-row">
            <p class="person-name">${escapeHtml(p.fullName)}</p>
            <span class="person-time">⏰ ${escapeHtml(p.time)}</span>
          </div>
          <div class="info-row">
            <span><b>บริษัท:</b> ${escapeHtml(p.company)}</span>
            <span><b>โทร:</b> ${escapeHtml(p.phone)}</span>
          </div>
          <div class="info-row">
            <span><b>เลขบัตรประชาชน:</b> ${escapeHtml(p.idCard)}</span>
          </div>
          <div class="info-row">
            <span><b>ทะเบียนรถ:</b> ${escapeHtml(p.vehiclePlate || '-')}</span>
            <span><b>ประเภทรถ:</b> ${escapeHtml(p.vehicleType || '-')}</span>
          </div>
          <div class="info-row">
            <span><b>ติดต่อ:</b> ${escapeHtml(p.contactPerson)}</span>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

// แปลงลิงก์ Google Drive แบบ "view" ให้เป็นลิงก์แสดงรูปตรงๆ แบบ thumbnail
function toDirectImageUrl(driveUrl) {
  const match = driveUrl.match(/\/d\/(.+?)\//);
  if (match && match[1]) {
    return "https://drive.google.com/thumbnail?id=" + match[1] + "&sz=w200";
  }
  return driveUrl;
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

// โหลดครั้งแรก
loadData();

// รีเฟรชอัตโนมัติทุก 15 วินาที
setInterval(loadData, 15000);

// ปุ่มรีเฟรชเอง
document.getElementById('refreshBtn').addEventListener('click', loadData);
</script>

</body>
</html>
